<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Lio – Wer wird Procurement-Millionär?</title>
<style>
:root{
  --ink:#000;--paper:#fff;
  --midnight:#0E2131;--midnight-deep:#050d18;
  --mist:#B1C5C4;--sky:#66B3CE;--slate:#495B65;--teal:#437179;--sage:#669F9D;
  --q-edge:#7ecdf0;--q-blue-1:#234fb8;--q-blue-2:#0c1f5c;
  --q-orange-1:#ff9a26;--q-orange-2:#d96a00;
  --q-green-1:#1cc474;--q-green-2:#0c7c45;
  --q-red-1:#e0383a;--q-red-2:#8a0c14;
  --txt:#e7eef2;--txt-mute:rgba(231,238,242,.65);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:"Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;user-select:none;color:var(--txt);background:#01040c}

/* ─── STUDIO STAGE BACKGROUND ─── */
.stage-bg{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.stage-bg::before{content:'';position:absolute;inset:0;background:
  radial-gradient(ellipse 90% 60% at 50% 100%, rgba(102,179,206,.16) 0%, transparent 60%),
  radial-gradient(ellipse 80% 60% at 50% -10%, #102650 0%, #061230 40%, #02060d 100%)}
.stage-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%, transparent 25%, rgba(0,0,0,.55) 100%)}
.pillars{position:absolute;inset:0}
.pillar{position:absolute;top:-5%;bottom:-5%;width:4px;background:linear-gradient(to bottom,transparent,var(--sky) 25%,var(--sky) 75%,transparent);opacity:.32;filter:blur(2px);animation:pillarPulse 3.6s ease-in-out infinite}
.pillar:nth-child(1){left:5%;animation-delay:0s}
.pillar:nth-child(2){left:12%;animation-delay:.8s;background:linear-gradient(to bottom,transparent,var(--teal) 25%,var(--teal) 75%,transparent)}
.pillar:nth-child(3){right:5%;animation-delay:.4s}
.pillar:nth-child(4){right:12%;animation-delay:1.2s;background:linear-gradient(to bottom,transparent,var(--teal) 25%,var(--teal) 75%,transparent)}
.pillar.led-dots{width:8px;background:repeating-linear-gradient(to bottom, transparent 0 6px, var(--sky) 6px 10px);opacity:.55;filter:blur(.3px) drop-shadow(0 0 4px var(--sky))}
.pillar.led-dots.l{left:18%}
.pillar.led-dots.r{right:18%}
@keyframes pillarPulse{0%,100%{opacity:.32}50%{opacity:.6}}
.overhead{position:absolute;top:-22vh;left:50%;transform:translateX(-50%);width:120vw;height:44vh;border-radius:50%;background:radial-gradient(ellipse 60% 70% at 50% 0%, rgba(102,179,206,.16) 0%, transparent 65%);pointer-events:none}
.overhead::before{content:'';position:absolute;left:50%;top:48%;transform:translateX(-50%);width:70vw;height:70vw;border-radius:50%;border:1px dashed rgba(102,179,206,.18)}
.overhead::after{content:'';position:absolute;left:50%;top:48%;transform:translateX(-50%);width:85vw;height:85vw;border-radius:50%;border:1px dashed rgba(102,179,206,.1)}
.floor{position:absolute;left:50%;bottom:-30vh;transform:translateX(-50%);width:160vw;height:60vh;border-radius:50%;background:
  radial-gradient(ellipse at 50% 0%, rgba(102,179,206,.15) 0%, transparent 50%),
  radial-gradient(ellipse at 50% 0%, rgba(15,40,80,.55) 0%, rgba(2,6,16,0) 70%)}
.floor::before,.floor::after{content:'';position:absolute;left:50%;top:-1px;transform:translateX(-50%);border-radius:50%;border:1px solid rgba(102,179,206,.18)}
.floor::before{width:55vw;height:55vw}
.floor::after{width:95vw;height:95vw;border-color:rgba(102,179,206,.09)}
.slit{position:absolute;inset:0;background:repeating-linear-gradient(90deg, transparent 0, transparent 24px, rgba(102,179,206,.035) 24px, rgba(102,179,206,.035) 25px);mix-blend-mode:screen;opacity:.7;pointer-events:none}
.stars{position:absolute;inset:0;background-image:radial-gradient(1.5px 1.5px at 12% 18%, rgba(255,255,255,.4) 50%, transparent),radial-gradient(1px 1px at 78% 22%, rgba(102,179,206,.5) 50%, transparent),radial-gradient(1.5px 1.5px at 88% 70%, rgba(255,255,255,.35) 50%, transparent),radial-gradient(1px 1px at 18% 78%, rgba(102,179,206,.4) 50%, transparent),radial-gradient(1px 1px at 42% 9%, rgba(255,255,255,.3) 50%, transparent),radial-gradient(1.5px 1.5px at 62% 88%, rgba(255,255,255,.4) 50%, transparent);animation:twinkle 4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.7}50%{opacity:1}}

#fx-canvas{position:fixed;inset:0;z-index:30;pointer-events:none}

/* ─── SCREENS ─── */
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;visibility:hidden;transition:opacity .4s cubic-bezier(.2,.8,.2,1),visibility .4s;z-index:5}
.scr.on{opacity:1;pointer-events:auto;visibility:visible;z-index:10}

/* ─── ANIMATED MODERATOR (cartoon Vladi) ─── */
.host{position:relative;display:inline-flex;align-items:flex-end;justify-content:center;animation:breathing 4.4s ease-in-out infinite}
.host-halo{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);width:130%;height:130%;background:radial-gradient(circle, rgba(102,179,206,.42) 0%, rgba(102,179,206,.09) 38%, transparent 65%);pointer-events:none;animation:haloPulse 3s ease-in-out infinite;z-index:0;filter:blur(1px);border-radius:50%}
.spotlight{position:absolute;left:50%;top:-180%;transform:translateX(-50%);width:140%;height:200%;background:linear-gradient(180deg, rgba(102,179,206,.14) 0%, rgba(102,179,206,.04) 60%, transparent 100%);clip-path:polygon(38% 0, 62% 0, 100% 100%, 0 100%);pointer-events:none;mix-blend-mode:screen;z-index:0}
.podium{position:absolute;left:50%;bottom:-12%;transform:translateX(-50%);width:130%;height:22%;background:radial-gradient(ellipse at 50% 0%, rgba(102,179,206,.32) 0%, transparent 55%),radial-gradient(ellipse at 50% 0%, rgba(14,33,49,.8) 0%, transparent 70%);border-radius:50%;filter:blur(2px);opacity:.9;pointer-events:none;z-index:0}
.vladi-slot{position:relative;z-index:1;width:100%;height:100%;display:flex;align-items:flex-end;justify-content:center}
.vladi-character{display:block;width:100%;height:auto;overflow:visible;filter:drop-shadow(0 14px 22px rgba(0,0,0,.35)) drop-shadow(0 0 22px rgba(102,179,206,.18))}

@keyframes breathing{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes haloPulse{0%,100%{opacity:.85;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}}
@keyframes talkPulse{0%,100%{box-shadow:0 0 0 1px rgba(102,179,206,.28),0 4px 24px rgba(102,179,206,.15)}50%{box-shadow:0 0 0 1px rgba(102,179,206,.5),0 4px 36px rgba(102,179,206,.3)}}

/* head idle sway */
.v-head{transform-box:fill-box;transform-origin:100px 130px;animation:vSway 5.7s ease-in-out infinite}
@keyframes vSway{0%,100%{transform:rotate(-1.4deg)}50%{transform:rotate(1.4deg)}}

/* pupils look around */
.v-pupils{transform-box:fill-box;transform-origin:100px 98px;animation:vLook 13s ease-in-out infinite}
@keyframes vLook{0%,12%,100%{transform:translate(0,0)}22%,30%{transform:translate(2.5px,-1px)}42%,50%{transform:translate(-2.5px,-1px)}62%,70%{transform:translate(0,1.5px)}82%,88%{transform:translate(1.5px,1px)}}

/* blink */
.v-lid{transform-box:fill-box;transform-origin:center;transform:scaleY(0);animation:vBlink 5.4s ease-in-out infinite}
.v-lid-r{animation-delay:.04s}
@keyframes vBlink{0%,88%,100%{transform:scaleY(0)}91%,93%{transform:scaleY(1)}}

/* eyebrows raise on emotion */
.v-brow{transform-box:fill-box;transition:transform .25s cubic-bezier(.2,.8,.2,1)}
.v-brow-l{transform-origin:80px 84px}
.v-brow-r{transform-origin:120px 84px}

/* arms */
.v-arm{transform-box:fill-box;transition:transform .35s cubic-bezier(.2,.8,.2,1)}
.v-arm-l{transform-origin:55px 175px}
.v-arm-r{transform-origin:145px 175px}

/* mouth states */
.v-m{transform-box:fill-box;transform-origin:100px 135px;transition:opacity .18s}
.v-m-talk,.v-m-happy,.v-m-shock,.v-m-teeth{opacity:0}

/* TALKING expression */
.host.talking .v-m-smile{opacity:0}
.host.talking .v-m-talk{opacity:1;animation:vTalk .28s ease-in-out infinite alternate}
@keyframes vTalk{from{transform:scale(.55,.4)}to{transform:scale(1,1.15)}}
.host.talking .v-brow{transform:translateY(-1px)}

/* HAPPY (correct answer) */
.host.happy .v-m-smile{opacity:0}
.host.happy .v-m-happy{opacity:1}
.host.happy .v-m-teeth{opacity:1}
.host.happy .v-brow{transform:translateY(-3px)}
.host.happy .v-arm-r{transform:rotate(-30deg) translateY(-2px)}

/* SHOCK (wrong answer) */
.host.shock .v-m-smile{opacity:0}
.host.shock .v-m-shock{opacity:1}
.host.shock .v-brow-l{transform:translateY(-4px) rotate(-14deg)}
.host.shock .v-brow-r{transform:translateY(-4px) rotate(14deg)}
.host.shock .v-eyes-grp{animation:vShock .55s ease}
@keyframes vShock{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* WAVING */
.host.waving .v-arm-r{animation:vWave 1.4s ease-in-out 2}
@keyframes vWave{0%,100%{transform:rotate(0)}25%{transform:rotate(-100deg) translateY(-6px)}75%{transform:rotate(-80deg) translateY(-6px)}}

/* THINKING (during locked answer) */
.host.thinking .v-brow-l{transform:translateY(-1px) rotate(-10deg)}
.host.thinking .v-brow-r{transform:translateY(2px) rotate(-4deg)}
.host.thinking .v-m-smile{opacity:.6}

/* ─── TYPE / BRAND ─── */
.eyebrow{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--sky);font-weight:600}
.lio-brand{display:inline-flex;align-items:center;gap:10px;color:rgba(231,238,242,.55);font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:500}
.lio-brand img{height:16px;filter:invert(1) brightness(2);opacity:.85}

/* ═══════════════════════════════════════════════
   TITLE SCREEN
   ═══════════════════════════════════════════════ */
#s-title{gap:22px;padding:24px}
.title-host{width:clamp(170px,19vw,240px);aspect-ratio:200/280}
.title-stack{display:flex;flex-direction:column;align-items:center;gap:14px;max-width:820px}
.show-title{font-size:clamp(40px,7vw,84px);font-weight:900;line-height:.92;letter-spacing:-.03em;text-align:center;color:var(--paper)}
.show-title .small{display:block;font-size:.32em;color:var(--sky);letter-spacing:.08em;font-weight:600;margin-bottom:10px;text-transform:uppercase}
.show-title .accent{display:block;background:linear-gradient(135deg,#ffd07a 0%,#ff9a26 45%,#d96a00 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 6px 28px rgba(255,138,34,.35))}
.show-sub{color:rgba(231,238,242,.78);font-size:clamp(13px,1.35vw,15px);text-align:center;max-width:540px;line-height:1.55;font-weight:400;font-style:italic;min-height:48px}
.lang-row{display:flex;gap:0;border:1px solid rgba(102,179,206,.3);border-radius:999px;overflow:hidden;background:rgba(14,33,49,.5);backdrop-filter:blur(8px)}
.lang-btn{padding:9px 24px;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;background:transparent;color:rgba(231,238,242,.55);cursor:pointer;border:none;transition:.2s}
.lang-btn.on{background:var(--sky);color:var(--midnight)}
.lang-btn:not(.on):hover{color:var(--paper)}
.name-input{width:clamp(220px,30vw,340px);padding:13px 20px;font-family:inherit;font-size:15px;font-weight:500;color:var(--paper);background:rgba(14,33,49,.5);border:1px solid rgba(102,179,206,.3);border-radius:4px;outline:none;text-align:center;letter-spacing:.005em;backdrop-filter:blur(8px);transition:.2s}
.name-input::placeholder{color:rgba(231,238,242,.4);font-weight:400}
.name-input:focus{border-color:var(--sky);background:rgba(14,33,49,.75);box-shadow:0 0 0 4px rgba(102,179,206,.14)}
.title-actions{display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center}
.btn-primary{padding:16px 42px;font-family:inherit;font-size:13px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--paper);background:linear-gradient(135deg,#ff9a26,#d96a00);border:none;border-radius:4px;cursor:pointer;transition:transform .2s cubic-bezier(.2,.8,.2,1),box-shadow .2s;box-shadow:0 8px 28px rgba(217,106,0,.4),inset 0 1px 0 rgba(255,255,255,.22)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(217,106,0,.55),inset 0 1px 0 rgba(255,255,255,.22)}
.btn-primary:active{transform:translateY(0)}
.btn-ghost{padding:14px 26px;font-family:inherit;font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(231,238,242,.7);background:transparent;border:1px solid rgba(102,179,206,.3);border-radius:4px;cursor:pointer;transition:.2s}
.btn-ghost:hover{color:var(--paper);border-color:var(--sky);background:rgba(102,179,206,.08)}

/* ═══════════════════════════════════════════════
   GAME SCREEN
   ═══════════════════════════════════════════════ */
#s-game{display:grid;grid-template-rows:auto 1fr;grid-template-columns:1fr clamp(190px,21vw,260px);gap:0;padding:14px 18px}

/* TOP BAR */
.top-bar{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:14px;padding-bottom:8px}
.brand-tab{display:flex;align-items:center;gap:10px;padding:8px 16px 8px 12px;border:1px solid rgba(102,179,206,.2);border-radius:4px;background:rgba(14,33,49,.55);backdrop-filter:blur(8px)}
.brand-tab img{height:18px;filter:invert(1) brightness(2)}
.brand-tab .lbl{font-size:10px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:rgba(231,238,242,.7)}
.lifelines{display:flex;gap:12px}
.ll{position:relative;width:60px;height:60px;background:none;border:none;padding:0;cursor:pointer;transition:transform .15s cubic-bezier(.2,.8,.2,1);color:#fff}
.ll:hover:not(.used){transform:translateY(-2px) scale(1.04)}
.ll-shape,.ll-inner{position:absolute;inset:0;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0 75%,0 25%)}
.ll-shape{background:linear-gradient(135deg,var(--q-edge),#cfeefa,var(--q-edge));filter:drop-shadow(0 4px 14px rgba(102,179,206,.3))}
.ll-inner{inset:2px;background:linear-gradient(180deg,#234fb8 0%,#15388f 50%,#0c1f5c 100%)}
.ll-icon{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;width:100%;height:100%;font-size:12px;font-weight:700;letter-spacing:.04em;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.ll.used .ll-shape{background:linear-gradient(135deg,#5a3838,#3a2a2a,#5a3838);filter:none}
.ll.used .ll-inner{background:linear-gradient(180deg,#3a2424 0%,#1c1010 100%)}
.ll.used .ll-icon{color:rgba(255,255,255,.4);position:relative}
.ll.used .ll-icon::after{content:'';position:absolute;left:18%;right:18%;top:50%;height:2px;background:rgba(224,56,58,.85);transform:rotate(-15deg);box-shadow:0 0 4px rgba(224,56,58,.6)}
.ll.used{cursor:default}
.top-r{display:flex;gap:8px;align-items:center}
.sm-btn{padding:8px 14px;font-family:inherit;font-size:10px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:rgba(231,238,242,.7);background:rgba(14,33,49,.55);border:1px solid rgba(102,179,206,.2);border-radius:4px;cursor:pointer;transition:.2s;backdrop-filter:blur(8px)}
.sm-btn:hover{color:var(--paper);border-color:var(--sky)}

/* MAIN AREA */
.game-main{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:14px;padding:8px 0;overflow:hidden}

.host-area{display:flex;flex-direction:column;align-items:center;gap:10px;width:min(64%,560px);z-index:2}
.bottom-cluster{display:flex;flex-direction:column;align-items:center;gap:10px;width:100%}
.host-game{width:clamp(140px,15vw,200px);aspect-ratio:200/240}
.speech-bubble{position:relative;width:100%;background:rgba(14,33,49,.78);backdrop-filter:blur(10px);border:1px solid rgba(102,179,206,.32);border-radius:4px;padding:10px 18px;font-size:13px;font-weight:400;color:rgba(231,238,242,.95);line-height:1.45;text-align:center;font-style:italic;min-height:42px;animation:talkPulse 3.5s ease-in-out infinite;display:flex;align-items:center;justify-content:center}
.speech-bubble::before{content:'';position:absolute;top:-7px;left:50%;transform:translateX(-50%) rotate(45deg);width:14px;height:14px;background:rgba(14,33,49,.78);border-left:1px solid rgba(102,179,206,.32);border-top:1px solid rgba(102,179,206,.32)}

/* TIMER */
.timer-wrap{width:100%;max-width:880px;display:flex;align-items:center;gap:14px;padding:0 8px}
.timer-rail{flex:1;height:5px;background:rgba(102,179,206,.1);border-radius:3px;overflow:hidden;position:relative;box-shadow:inset 0 0 0 1px rgba(102,179,206,.08)}
.timer-fill{height:100%;width:100%;background:linear-gradient(90deg,var(--q-green-1),#5be2a0);border-radius:3px;transition:width .1s linear;box-shadow:0 0 14px var(--q-green-1)}
.timer-fill.warning{background:linear-gradient(90deg,var(--q-orange-1),#ffc36b);box-shadow:0 0 14px var(--q-orange-1)}
.timer-fill.danger{background:linear-gradient(90deg,var(--q-red-1),#ff7779);box-shadow:0 0 18px var(--q-red-1);animation:timer-pulse .5s ease infinite}
@keyframes timer-pulse{0%,100%{opacity:1}50%{opacity:.55}}
.timer-num{font-weight:700;font-size:14px;min-width:36px;text-align:center;color:rgba(231,238,242,.95);font-variant-numeric:tabular-nums;letter-spacing:.02em}

/* WWM LOZENGE — outer is bright sky-blue stroke, inner is deep blue gradient */
.lozenge{position:relative;background:transparent;border:none;cursor:default}
.lozenge .outer,.lozenge .inner{position:absolute;inset:0;clip-path:polygon(2% 50%, 4% 0%, 96% 0%, 98% 50%, 96% 100%, 4% 100%)}
.lozenge .outer{background:linear-gradient(135deg,var(--q-edge) 0%,#dff2fa 50%,var(--q-edge) 100%);filter:drop-shadow(0 6px 22px rgba(102,179,206,.28))}
.lozenge .inner{inset:2px;background:linear-gradient(180deg,#2a55c4 0%,#15388f 35%,#0c1f5c 100%)}
.lozenge .content{position:relative;z-index:2;display:flex;align-items:center;justify-content:center;width:100%;height:100%}

/* QUESTION */
.q-bar{width:100%;max-width:880px;min-height:68px}
.q-bar .content{font-size:clamp(13px,1.45vw,17px);font-weight:600;color:var(--paper);text-align:center;letter-spacing:-.005em;line-height:1.3;text-shadow:0 1px 2px rgba(0,0,0,.45);padding:14px 56px;text-wrap:pretty}

/* ANSWERS */
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;width:100%;max-width:880px}
.ans{min-height:56px;cursor:pointer;transition:transform .15s cubic-bezier(.2,.8,.2,1),filter .2s}
.ans .content{justify-content:flex-start;padding:8px 22px 8px 54px;font-size:clamp(12px,1.32vw,15px);font-weight:500;color:var(--paper);letter-spacing:-.005em;line-height:1.3;text-shadow:0 1px 2px rgba(0,0,0,.45);text-align:left;text-wrap:pretty}
.ans .letter{position:absolute;left:34px;top:50%;transform:translateY(-50%);z-index:3;font-weight:700;font-size:clamp(12px,1.32vw,15px);color:var(--q-orange-1);letter-spacing:.04em;text-shadow:0 1px 2px rgba(0,0,0,.4)}
.ans .marker{position:absolute;left:20px;top:50%;transform:translateY(-50%) rotate(45deg);z-index:3;width:9px;height:9px;background:linear-gradient(135deg,#fff,#cfe5f1);box-shadow:0 0 8px rgba(255,255,255,.5)}
.ans:hover:not(.locked):not(.dim):not(.correct):not(.wrong){transform:translateY(-1px)}
.ans:hover:not(.locked):not(.dim):not(.correct):not(.wrong) .inner{background:linear-gradient(180deg,#3669e0 0%,#1a40a5 35%,#0c2470 100%)}
.ans.locked .outer{background:linear-gradient(135deg,#ffd07a 0%,#fff5da 50%,#ffd07a 100%);filter:drop-shadow(0 6px 22px rgba(255,154,38,.45))}
.ans.locked .inner{background:linear-gradient(180deg,#ffae3d 0%,#ee7d10 50%,#a04400 100%);animation:lockedPulse 1.1s ease-in-out infinite}
.ans.locked .letter{color:#fff}
.ans.correct .outer{background:linear-gradient(135deg,#9fe7c0 0%,#fff 50%,#9fe7c0 100%);filter:drop-shadow(0 6px 22px rgba(28,196,116,.5))}
.ans.correct .inner{background:linear-gradient(180deg,#34d488 0%,var(--q-green-2) 100%);animation:correctPulse .55s ease 3}
.ans.correct .letter{color:#fff}
.ans.wrong .outer{background:linear-gradient(135deg,#f0a8a8 0%,#fff 50%,#f0a8a8 100%);filter:drop-shadow(0 6px 22px rgba(224,56,58,.45))}
.ans.wrong .inner{background:linear-gradient(180deg,#ef5052 0%,var(--q-red-2) 100%)}
.ans.wrong .letter{color:#fff}
.ans.dim{opacity:.16;pointer-events:none;filter:saturate(.3)}
@keyframes lockedPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.18)}}
@keyframes correctPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.32)}}

@keyframes shake{0%,100%{transform:translate(0)}10%,50%,90%{transform:translate(-4px,2px)}30%,70%{transform:translate(4px,-2px)}60%{transform:translate(-2px,4px)}}
.shake{animation:shake .45s ease-in-out}
@keyframes level-flash{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
.level-flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(28,196,116,.18),transparent 70%);z-index:25;pointer-events:none;opacity:0;animation:level-flash .8s ease-out forwards}
.level-flash.wrong-flash{background:radial-gradient(circle,rgba(224,56,58,.22),transparent 70%)}

/* MONEY LADDER */
.ladder{display:flex;flex-direction:column;justify-content:flex-end;gap:4px;padding:8px 6px 8px 14px;overflow-y:auto}
.ladder::-webkit-scrollbar{width:4px}
.ladder::-webkit-scrollbar-thumb{background:rgba(102,179,206,.3);border-radius:2px}
.lv{position:relative;height:28px;font-size:11px;font-weight:600;color:rgba(231,238,242,.55);letter-spacing:.01em;transition:.3s}
.lv-shape{position:absolute;inset:0;clip-path:polygon(4% 50%,7% 0%,93% 0%,96% 50%,93% 100%,7% 100%);background:rgba(14,33,49,.4);transition:.3s}
.lv-content{position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between;width:100%;height:100%;padding:0 16px}
.lv .num{color:rgba(255,154,38,.85);font-size:10px;font-weight:700;min-width:18px;letter-spacing:.04em;font-variant-numeric:tabular-nums}
.lv .amt{font-variant-numeric:tabular-nums;font-weight:600;font-size:11px;letter-spacing:.01em}
.lv.safe .num,.lv.safe .amt{color:#fff}
.lv.safe .lv-shape{background:linear-gradient(180deg,rgba(20,45,90,.6),rgba(14,33,49,.4));box-shadow:inset 0 0 0 1px rgba(102,179,206,.28)}
.lv.cur .lv-shape{background:linear-gradient(180deg,#ffd07a 0%,#ff9a26 50%,#d96a00 100%);box-shadow:0 0 22px rgba(255,154,38,.7),inset 0 0 0 1px rgba(255,255,255,.4);animation:curPulse 1.4s ease-in-out infinite}
.lv.cur .num,.lv.cur .amt{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.lv.done{opacity:.4}
.lv.done .num,.lv.done .amt{color:rgba(231,238,242,.4)}
.lv.done .lv-shape{background:rgba(28,196,116,.08)}
@keyframes curPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.12)}}

/* MODALS */
.modal{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;background:rgba(2,6,16,.78);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s}
.modal.on{opacity:1;pointer-events:auto}
.modal-box{position:relative;background:linear-gradient(180deg,#0e2030 0%,#050d1c 100%);border:1px solid rgba(102,179,206,.3);border-radius:4px;padding:32px 36px;max-width:480px;width:90%;text-align:center;box-shadow:0 30px 70px rgba(0,0,0,.6),inset 0 0 0 1px rgba(102,179,206,.08)}
.modal-box .eyebrow{margin-bottom:10px}
.modal-box h2{font-size:22px;font-weight:700;letter-spacing:-.01em;color:var(--paper);margin-bottom:8px;line-height:1.2}
.modal-rule{height:1px;background:linear-gradient(90deg,transparent,rgba(102,179,206,.3),transparent);margin:14px 0}

.aud-bars{display:flex;align-items:flex-end;justify-content:center;gap:18px;margin:20px 0 6px}
.aud-col{display:flex;flex-direction:column;align-items:center;gap:8px;width:62px}
.aud-fill-wrap{width:50px;height:130px;display:flex;align-items:flex-end;background:rgba(102,179,206,.06);border-radius:2px;overflow:hidden;position:relative;box-shadow:inset 0 0 0 1px rgba(102,179,206,.12)}
.aud-fill{width:100%;background:linear-gradient(180deg,var(--sky),var(--teal));transition:height .9s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 16px rgba(102,179,206,.5);height:0}
.aud-lbl{font-weight:700;font-size:12px;color:var(--q-orange-1);letter-spacing:.04em}
.aud-pct{font-weight:700;font-size:13px;color:var(--paper);font-variant-numeric:tabular-nums}

.phone-call{display:flex;flex-direction:column;align-items:center;gap:10px;margin:14px 0 18px}
.phone-avatar{width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#1e3a52,#0e2131);display:flex;align-items:center;justify-content:center;border:1px solid rgba(102,179,206,.35);color:var(--sky);animation:phoneRing 1.2s ease-in-out infinite}
.phone-avatar svg{width:28px;height:28px}
@keyframes phoneRing{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
.phone-name{font-size:13px;color:var(--sky);font-weight:600;letter-spacing:.02em}
.phone-text{font-size:15px;color:rgba(231,238,242,.95);line-height:1.55;font-style:italic;padding:0 12px}

.lb-list{text-align:left;margin:14px 0 4px;max-height:340px;overflow-y:auto}
.lb-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:2px;font-size:13px;font-weight:500;transition:.2s}
.lb-row:nth-child(odd){background:rgba(102,179,206,.05)}
.lb-rank{font-weight:700;min-width:30px;text-align:center;font-size:14px;color:rgba(231,238,242,.5);font-variant-numeric:tabular-nums}
.lb-rank.gold{color:#ffd54a}.lb-rank.silver{color:#dce3e8}.lb-rank.bronze{color:#cd7f32}
.lb-name{flex:1;color:var(--paper);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.lb-score{color:var(--q-green-1);font-weight:700;font-size:12px;font-variant-numeric:tabular-nums}
.lb-empty{color:rgba(231,238,242,.4);font-style:italic;padding:24px 0;text-align:center}

/* GAME OVER */
#s-over{gap:14px}
.go-team{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--sky);font-weight:600;margin-top:8px}
.go-label{font-size:clamp(13px,1.6vw,18px);letter-spacing:.22em;text-transform:uppercase;color:rgba(231,238,242,.65);font-weight:600;margin-top:2px}
.go-amount{font-size:clamp(56px,10vw,120px);font-weight:900;letter-spacing:-.045em;line-height:1;background:linear-gradient(135deg,#ffd07a 0%,#ff9a26 40%,#d96a00 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 10px 38px rgba(255,138,34,.45));margin-top:4px}
.go-amount.lost{background:linear-gradient(135deg,#94a3b8,#475569);-webkit-background-clip:text;background-clip:text;filter:none}
.go-sub{color:rgba(231,238,242,.7);font-size:14px;max-width:520px;text-align:center;line-height:1.6;font-style:italic;margin-top:4px}
.go-actions{display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;justify-content:center}

/* MOBILE */
@media (max-width:760px){
  #s-game{grid-template-columns:1fr 130px;padding:8px}
  .host-game{width:90px;aspect-ratio:200/220}
  .speech-bubble{font-size:11px;padding:7px 12px;min-height:32px}
  .q-bar{min-height:54px}
  .q-bar .content{font-size:12px;padding:8px 28px}
  .ans{min-height:48px}
  .ans .content{font-size:11px;padding:6px 14px 6px 40px}
  .ans .letter{left:24px;font-size:11px}
  .ans .marker{left:13px;width:7px;height:7px}
  .ll{width:46px;height:46px}
  .ll-icon{font-size:10px}
  .show-title{font-size:42px}
  .lv{height:22px;font-size:10px}
  .lv-content{padding:0 12px}
}
</style>
</head>

<script>
// ════════════════════════════════════════════════
//  Lio – Wer wird Procurement-Millionär? — game logic preserved verbatim

const audio={
  ctx:null,on:true,
  init(){if(!this.ctx)try{this.ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){this.on=false}},
  tone(f,d,w='sine',v=.06){
    if(!this.on||!this.ctx)return;
    const o=this.ctx.createOscillator(),g=this.ctx.createGain();
    o.type=w;o.frequency.value=f;g.gain.setValueAtTime(v,this.ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+d);
    o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d);
  },
  select(){this.tone(440,.08);this.tone(554,.06)},
  correct(){[0,80,160,240,320].forEach((d,i)=>setTimeout(()=>this.tone([523,659,784,1047,1319][i],.15+(i*.03)),d))},
  wrong(){this.tone(330,.2,'sawtooth',.07);setTimeout(()=>this.tone(262,.2,'sawtooth',.07),100);setTimeout(()=>this.tone(196,.4,'sawtooth',.06),200);},
  million(){[0,100,200,300,400,500,650,800].forEach((d,i)=>setTimeout(()=>this.tone([523,659,784,1047,1319,1568,1568,2093][i],.25,'sine',.06),d))},
  lifeline(){this.tone(660,.06,'triangle');setTimeout(()=>this.tone(880,.08,'triangle'),60)},
  suspense(remaining){if(remaining<=5)this.tone(880,.05,'sine',.04);else this.tone(660,.03,'sine',.02)},
  levelUp(){[0,60,120].forEach((d,i)=>setTimeout(()=>this.tone([784,988,1175][i],.1,'sine',.05),d))},
  timeUp(){this.tone(440,.15,'sawtooth',.06);setTimeout(()=>this.tone(349,.15,'sawtooth',.06),80);setTimeout(()=>this.tone(262,.3,'sawtooth',.06),160);},
};
function toggleMute(){audio.on=!audio.on;document.getElementById('mute-btn').textContent=audio.on?'Sound On':'Muted'}

const fx={
  canvas:null,ctx:null,items:[],running:false,
  init(){this.canvas=document.getElementById('fx-canvas');this.ctx=this.canvas.getContext('2d');this.resize();window.addEventListener('resize',()=>this.resize())},
  resize(){this.canvas.width=window.innerWidth;this.canvas.height=window.innerHeight},
  spawn(count,opts){
    for(let i=0;i<count;i++){
      this.items.push({x:opts.x??this.canvas.width/2,y:opts.y??this.canvas.height/2,vx:(Math.random()-.5)*(opts.spread||10),vy:-Math.random()*(opts.upforce||12)-2,life:opts.life||90,maxLife:opts.life||90,size:Math.random()*(opts.maxSize||8)+(opts.minSize||3),color:opts.colors[Math.floor(Math.random()*opts.colors.length)],rot:Math.random()*6.28,rotV:(Math.random()-.5)*.2,grav:opts.grav||.12,shape:opts.shape||'rect'});
    }
    if(!this.running)this.loop();
  },
  loop(){
    this.running=true;
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height);
    for(let i=this.items.length-1;i>=0;i--){
      const p=this.items[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.life--;p.rot+=p.rotV;
      const a=p.life/p.maxLife;
      this.ctx.save();this.ctx.translate(p.x,p.y);this.ctx.rotate(p.rot);this.ctx.globalAlpha=a;this.ctx.fillStyle=p.color;
      if(p.shape==='circle'){this.ctx.beginPath();this.ctx.arc(0,0,p.size/2,0,6.28);this.ctx.fill();}
      else{this.ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);}
      this.ctx.restore();
      if(p.life<=0)this.items.splice(i,1);
    }
    if(this.items.length>0)requestAnimationFrame(()=>this.loop());else this.running=false;
  },
  correctBurst(){
    const r=document.querySelector('.ans.correct');if(!r)return;
    const b=r.getBoundingClientRect();
    this.spawn(28,{x:b.left+b.width/2,y:b.top+b.height/2,spread:8,upforce:8,life:55,colors:['#1cc474','#5be2a0','#ff9a26','#7ecdf0'],maxSize:6,minSize:2,shape:'circle'});
  },
  wrongShake(){
    const el=document.getElementById('s-game');el.classList.add('shake');
    setTimeout(()=>el.classList.remove('shake'),500);
    const flash=document.createElement('div');flash.className='level-flash wrong-flash';document.body.appendChild(flash);
    setTimeout(()=>flash.remove(),900);
  },
  levelUpFlash(){
    const flash=document.createElement('div');flash.className='level-flash';document.body.appendChild(flash);
    setTimeout(()=>flash.remove(),900);
  },
  megaConfetti(){
    const w=this.canvas.width;
    const colors=['#ff9a26','#1cc474','#7ecdf0','#66B3CE','#437179','#ffd07a','#fff','#669F9D'];
    for(let wave=0;wave<6;wave++){
      setTimeout(()=>{this.spawn(50,{x:Math.random()*w,y:-20,spread:14,upforce:10,life:150,colors,maxSize:10,minSize:4,grav:.08});},wave*250);
    }
  }
};

// ── TIMER ──
const timer={
  dur:30,rem:30,interval:null,paused:false,
  start(secs){
    this.stop();this.dur=secs;this.rem=secs;this.paused=false;
    const bar=document.getElementById('timer-fill');
    bar.style.transition='none';bar.style.width='100%';bar.className='timer-fill';
    void bar.offsetWidth;bar.style.transition='width .1s linear';
    this.interval=setInterval(()=>{
      if(this.paused)return;
      this.rem-=.1;
      const pct=Math.max(0,(this.rem/this.dur)*100);
      bar.style.width=pct+'%';
      if(pct<=20)bar.className='timer-fill danger';
      else if(pct<=40)bar.className='timer-fill warning';
      else bar.className='timer-fill';
      document.getElementById('timer-num').textContent=Math.max(0,Math.ceil(this.rem));
      if(this.rem<=10&&this.rem>0){
        const rounded=Math.round(this.rem*10)/10;
        if(Math.abs(rounded-Math.round(rounded))<.05)audio.suspense(this.rem);
      }
      if(this.rem<=0){this.stop();timeUp();}
    },100);
  },
  stop(){if(this.interval){clearInterval(this.interval);this.interval=null}},
  pause(){this.paused=true},
  resume(){this.paused=false},
};

// ── GAME STATE ──
const game={active:false,level:0,questions:[],picked:-1,locked:false,ll50:false,llPh:false,llAu:false,teamName:'Team'};
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function pickN(arr,n){return shuffle(arr).slice(0,n)}

function startGame(){
  audio.init();fx.init();
  const nameEl=document.getElementById('team-name');
  game.teamName=nameEl.value.trim()||(lang==='de'?'Team':'Team');
  game.active=true;game.level=0;game.picked=-1;game.locked=false;
  game.ll50=false;game.llPh=false;game.llAu=false;
  const easy=pickN(Q_EASY,5).map(prepQ);
  const med=pickN(Q_MED,5).map(prepQ);
  const hard=pickN(Q_HARD,5).map(prepQ);
  game.questions=[...easy,...med,...hard];
  ['ll-50','ll-ph','ll-au'].forEach(id=>{document.getElementById(id).classList.remove('used')});
  showScreen('s-game');buildLadder();nextQuestion();
}

function prepQ(q){
  const idxs=[0,1,2,3],shuffled=shuffle(idxs);
  return{de:{q:q.de.q,a:shuffled.map(i=>q.de.a[i])},en:{q:q.en.q,a:shuffled.map(i=>q.en.a[i])},c:shuffled.indexOf(q.c)};
}

function nextQuestion(){
  game.picked=-1;game.locked=false;
  document.querySelectorAll('.ans').forEach(a=>{a.classList.remove('locked','correct','wrong','dim');a.style.pointerEvents=''});
  renderQ();updateLadder();
  const intro=t('q_intro')[game.level]||'';
  let msg=intro;
  if(SAFE.includes(game.level)&&game.level>0)msg=t('safe_msg').replace('{amt}',fmtE(LEVELS[game.level]))+intro;
  say(msg);
  const secs=game.level<5?35:game.level<10?30:25;
  timer.start(secs);
}

function renderQ(){
  const q=game.questions[game.level],d=q[lang];
  document.getElementById('q-text').textContent=d.q;
  d.a.forEach((a,i)=>document.getElementById('a'+i).textContent=a);
}
function say(txt){document.getElementById('g-speech').textContent=txt}

function pick(idx){
  if(game.locked||game.picked>=0)return;
  game.picked=idx;timer.stop();audio.select();
  document.querySelectorAll('.ans')[idx].classList.add('locked');
  setTimeout(()=>reveal(idx),1800);
}

function timeUp(){
  if(game.locked||game.picked>=0)return;
  game.locked=true;audio.timeUp();
  const q=game.questions[game.level];
  document.querySelectorAll('.ans')[q.c].classList.add('correct');
  say(t('timeup')+' → '+q[lang].a[q.c]);
  fx.wrongShake();
  setTimeout(()=>gameOver(false),3000);
}

function reveal(idx){
  game.locked=true;
  const q=game.questions[game.level],correct=q.c;
  const els=document.querySelectorAll('.ans');
  if(idx===correct){
    els[idx].classList.remove('locked');els[idx].classList.add('correct');
    audio.correct();fx.correctBurst();fx.levelUpFlash();
    const msgs=t('correct');
    say(msgs[Math.floor(Math.random()*msgs.length)]);
    if(game.level===14){setTimeout(()=>{audio.million();fx.megaConfetti();gameOver(true)},2000);}
    else{game.level++;audio.levelUp();setTimeout(()=>nextQuestion(),2200);}
  }else{
    els[idx].classList.remove('locked');els[idx].classList.add('wrong');
    els[correct].classList.add('correct');
    audio.wrong();fx.wrongShake();
    say(t('wrong')+' → '+q[lang].a[correct]);
    setTimeout(()=>gameOver(false),3000);
  }
}

function gameOver(won){
  timer.stop();game.active=false;
  let winnings=0;
  if(won){winnings=LEVELS[14]}
  else{for(let s=SAFE.length-1;s>=0;s--){if(game.level>SAFE[s]){winnings=LEVELS[SAFE[s]];break}}}
  document.getElementById('go-team').textContent=game.teamName;
  document.getElementById('go-label').textContent=won?t('won'):t('lost');
  const amtEl=document.getElementById('go-amount');
  amtEl.textContent=fmtE(winnings);
  amtEl.className='go-amount'+(won||winnings>0?'':' lost');
  let sub;
  if(won)sub=t('won_sub');
  else if(winnings>0)sub=t('lost_sub_safe').replace('{amt}',fmtE(winnings));
  else sub=t('lost_sub_zero');
  document.getElementById('go-sub').textContent=sub;
  const lb=JSON.parse(localStorage.getItem('lio-wwm-lb')||'[]');
  lb.push({name:game.teamName,score:winnings,level:won?15:game.level,date:Date.now()});
  lb.sort((a,b)=>b.score-a.score||b.level-a.level);
  if(lb.length>20)lb.length=20;
  localStorage.setItem('lio-wwm-lb',JSON.stringify(lb));
  document.getElementById('btn-again').textContent=t('play_again');
  document.getElementById('btn-lb').textContent=t('leaderboard');
  showScreen('s-over');
  if(won)setTimeout(()=>fx.megaConfetti(),600);
}

// ── LIFELINES ──
function use5050(){
  if(game.ll50||game.picked>=0||game.locked)return;
  game.ll50=true;audio.lifeline();
  document.getElementById('ll-50').classList.add('used');
  const q=game.questions[game.level];
  const wrong=shuffle([0,1,2,3].filter(i=>i!==q.c)).slice(0,2);
  wrong.forEach(i=>{document.querySelectorAll('.ans')[i].classList.add('dim')});
  say(lang==='de'?'Zwei falsche Antworten sind weg!':'Two wrong answers removed!');
}
function usePhone(){
  if(game.llPh||game.picked>=0||game.locked)return;
  game.llPh=true;audio.lifeline();timer.pause();
  document.getElementById('ll-ph').classList.add('used');
  const q=game.questions[game.level];
  const names=t('phone_names');
  const name=names[Math.floor(Math.random()*names.length)];
  const letter=['A','B','C','D'][q.c];
  document.getElementById('ph-name').textContent=name;
  document.getElementById('ph-text').textContent='"'+t('phone_pre')+letter+t('phone_suf')+'"';
  document.getElementById('m-phone').classList.add('on');
}
function useAudience(){
  if(game.llAu||game.picked>=0||game.locked)return;
  game.llAu=true;audio.lifeline();timer.pause();
  document.getElementById('ll-au').classList.add('used');
  const q=game.questions[game.level];
  const tier=game.level<5?'easy':game.level<10?'med':'hard';
  const bias=tier==='easy'?65:tier==='med'?50:35;
  const pcts=[0,0,0,0];
  pcts[q.c]=bias+Math.floor(Math.random()*15);
  let rem=100-pcts[q.c];
  [0,1,2,3].filter(i=>i!==q.c).forEach((i,idx,arr)=>{
    if(idx===arr.length-1){pcts[i]=rem}
    else{const v=Math.floor(Math.random()*Math.floor(rem*.6));pcts[i]=v;rem-=v}
  });
  document.getElementById('aud-title').textContent=t('aud_title');
  const barsEl=document.getElementById('aud-bars');
  barsEl.innerHTML=['A','B','C','D'].map((l,i)=>`
    <div class="aud-col">
      <div class="aud-pct">${pcts[i]}%</div>
      <div class="aud-fill-wrap"><div class="aud-fill" data-h="${pcts[i]}"></div></div>
      <div class="aud-lbl">${l}</div>
    </div>`).join('');
  document.getElementById('m-aud').classList.add('on');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    barsEl.querySelectorAll('.aud-fill').forEach(b=>{b.style.height=b.dataset.h+'%'});
  }));
}
function closeModal(id){
  document.getElementById(id).classList.remove('on');
  if(game.active)timer.resume();
}

// ── LADDER ──
function buildLadder(){
  const el=document.getElementById('ladder');
  el.innerHTML=LEVELS.map((v,i)=>{
    const safe=SAFE.includes(i)?'safe':'';
    return`<div class="lv ${safe}" data-lv="${i}"><div class="lv-shape"></div><div class="lv-content"><span class="num">${i+1}</span><span class="amt">${fmtE(v)}</span></div></div>`;
  }).reverse().join('');
}
function updateLadder(){
  document.querySelectorAll('.lv').forEach(el=>{
    const lv=+el.dataset.lv;
    el.classList.remove('cur','done');
    if(lv===game.level)el.classList.add('cur');
    else if(lv<game.level)el.classList.add('done');
  });
}

// ── LEADERBOARD ──
function showLBModal(){
  const lb=JSON.parse(localStorage.getItem('lio-wwm-lb')||'[]');
  const title=lang==='de'?'Bestenliste':'Leaderboard';
  document.getElementById('lb-modal-title').textContent=title;
  const listEl=document.getElementById('lb-list');
  if(!lb.length){
    listEl.innerHTML=`<div class="lb-empty">${lang==='de'?'Noch keine Einträge – spielt eine Runde!':'No entries yet – play a round!'}</div>`;
  }else{
    listEl.innerHTML=lb.slice(0,10).map((e,i)=>{
      const medal=i===0?'1':i===1?'2':i===2?'3':String(i+1);
      const rankCls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      const name=e.name||'Team';
      return`<div class="lb-row">
        <span class="lb-rank ${rankCls}">${medal}</span>
        <span class="lb-name">${name}</span>
        <span class="lb-score">${fmtE(e.score)} · ${lang==='de'?'Frage':'Q'} ${e.level}</span>
      </div>`;
    }).join('');
  }
  document.getElementById('m-lb').classList.add('on');
}

function showScreen(id){document.querySelectorAll('.scr').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on')}
function backToTitle(){showScreen('s-title')}

setLang('de');
document.getElementById('team-name').addEventListener('keydown',e=>{if(e.key==='Enter')startGame()});

// ── INJECT cartoon Vladi into all host slots ──
(function injectVladi(){
  const tpl=document.getElementById('t-vladi');
  document.querySelectorAll('.vladi-slot').forEach(slot=>{
    slot.appendChild(tpl.content.cloneNode(true));
  });
})();

// ── EXPRESSION DRIVER (visual only, no game logic touched) ──
function _setExpr(kind,dur){
  document.querySelectorAll('.host').forEach(h=>{
    ['happy','shock','thinking','waving'].forEach(c=>h.classList.remove(c));
    if(!kind)return;
    h.classList.add(kind);
    clearTimeout(h._expT);
    h._expT=setTimeout(()=>h.classList.remove(kind),dur||2400);
  });
}
function _triggerTalk(text){
  const len=(text||'').length;
  const ms=Math.max(1100,Math.min(4500,len*38));
  document.querySelectorAll('.host').forEach(h=>{
    h.classList.add('talking');
    clearTimeout(h._talkT);
    h._talkT=setTimeout(()=>h.classList.remove('talking'),ms);
  });
}
// Watch speech bubbles
['g-speech','title-speech'].forEach(id=>{
  const el=document.getElementById(id);
  if(!el)return;
  new MutationObserver(()=>_triggerTalk(el.textContent)).observe(el,{childList:true,characterData:true,subtree:true});
});
// Watch answer states for happy/shock
const _ansObs=new MutationObserver(muts=>{
  for(const m of muts){
    const el=m.target;
    if(m.attributeName!=='class')continue;
    if(el.classList.contains('correct'))_setExpr('happy',2600);
    else if(el.classList.contains('wrong'))_setExpr('shock',2600);
    else if(el.classList.contains('locked')&&!document.querySelector('.host.happy,.host.shock'))_setExpr('thinking',1800);
  }
});
document.querySelectorAll('.ans').forEach(a=>_ansObs.observe(a,{attributes:true,attributeFilter:['class']}));
// Random idle quirks (wave) every 14s if visible & not in expression
setInterval(()=>{
  if(Math.random()>=.4)return;
  const visible=document.querySelectorAll('.scr.on .host');
  visible.forEach(h=>{
    if(h.classList.contains('talking')||h.classList.contains('happy')||h.classList.contains('shock'))return;
    h.classList.add('waving');
    setTimeout(()=>h.classList.remove('waving'),3000);
  });
},14000);
// Initial welcome talk on title
setTimeout(()=>_triggerTalk(document.getElementById('title-speech').textContent),400);
</script>
